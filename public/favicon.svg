<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect x="5" y="5" width="90" height="90" rx="12" fill="#fefae0" stroke="#000" stroke-width="4"/>
  
  <!-- Grid of 5 tiles representing Wordle -->
  <!-- Row 1 -->
  <rect x="15" y="15" width="18" height="18" rx="4" fill="#6aaa64" stroke="#000" stroke-width="2.5"/>
  <rect x="37" y="15" width="18" height="18" rx="4" fill="#c9b458" stroke="#000" stroke-width="2.5"/>
  <rect x="59" y="15" width="18" height="18" rx="4" fill="#787c7e" stroke="#000" stroke-width="2.5"/>
  
  <!-- Row 2 -->
  <rect x="15" y="37" width="18" height="18" rx="4" fill="#c9b458" stroke="#000" stroke-width="2.5"/>
  <rect x="37" y="37" width="18" height="18" rx="4" fill="#6aaa64" stroke="#000" stroke-width="2.5"/>
  <rect x="59" y="37" width="18" height="18" rx="4" fill="#c9b458" stroke="#000" stroke-width="2.5"/>
  
  <!-- Row 3 - just center tile with cute face -->
  <rect x="37" y="59" width="18" height="18" rx="4" fill="#d4a373" stroke="#000" stroke-width="2.5"/>
  <!-- Cute eyes -->
  <circle cx="43" cy="65" r="2" fill="#000"/>
  <circle cx="49" cy="65" r="2" fill="#000"/>
  <!-- Cute smile -->
  <path d="M 43 70 Q 46 73 49 70" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
